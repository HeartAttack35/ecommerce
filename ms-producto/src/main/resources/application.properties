spring.application.name=ms-producto
server.port=${PORT:8083}

# Conexión dinámica a la Base de Datos respectiva
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3308}/${DB_NAME:db_producto}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# Hibernar y persistencia
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka y Seguridad Interna
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
jwt.secret=${JWT_SECRET:ecommerce_secreto_super_seguro_1234567890}
