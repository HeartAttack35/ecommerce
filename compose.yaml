  # ─── Infraestructura ───────────────────────────────────────────────────────

  ms-eureka:
    build: ./ms-eureka
    container_name: ms-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - backend-network

  ms-gateway:
    build: ./ms-gateway
    container_name: ms-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      - ms-eureka
    networks:
      - backend-network

  # ─── Microservicios de Negocio ─────────────────────────────────────────────

  ms-auth:
    build: ./ms-auth
    container_name: ms-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      PORT: 8081
      DB_HOST: mysql-auth
      DB_PORT: 3306
      DB_NAME: db_auth
      DB_USER: appuser
      DB_PASSWORD: 1234
      JWT_SECRET: ecommerce_secreto_super_seguro_1234567890
      EUREKA_URL: http://ms-eureka:8761/eureka/
    depends_on:
      - mysql-auth
      - ms-eureka
    networks:
      - backend-network

