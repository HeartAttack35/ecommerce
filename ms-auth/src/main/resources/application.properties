spring.application.name=ms-auth
server.port=8082

# Conexión a MySQL (usando el puerto 3307 expuesto en tu compose.yaml)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:db_auth}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# Configuración de JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Registro en Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Clave secreta para firmar los JWT
jwt.secret=${JWT_SECRET:ecommerce_secreto_super_seguro_1234567890}